[build]
  publish = "."

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[redirects]]
  from = "/admissions"
  to = "/admissions.html"
  status = 200

[[redirects]]
  from = "/exams"
  to = "/exams.html"
  status = 200

[[redirects]]
  from = "/about"
  to = "/about.html"
  status = 200

[[redirects]]
  from = "/faculty"
  to = "/faculty.html"
  status = 200

[[redirects]]
  from = "/downloads"
  to = "/downloads.html"
  status = 200

[[redirects]]
  from = "/contact"
  to = "/contact.html"
  status = 200

[[redirects]]
  from = "/affiliation"
  to = "/affiliation.html"
  status = 200

[[redirects]]
  from = "/search"
  to = "/search.html"
  status = 200
